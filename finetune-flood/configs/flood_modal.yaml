# leap-finetune config: VLM SFT on LFM2.5-VL-450M with Sentinel-2 image pairs.
#
# Full fine-tune (use_peft: false), not LoRA. Rationale: satellite multispectral
# imagery is severely underrepresented in the base VLM's pretraining mix, so the
# vision projector has to genuinely re-learn how to map these tiles into useful
# tokens — LoRA on top of a frozen projector is not enough. At 450M parameters,
# full fine-tune fits comfortably on a single H100.

project_name: "finetune-flood"
model_name: "LFM2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  # Volume mounts at /finetune-flood (see modal.output_dir below). The JSONL
  # references images by paths relative to its own directory, e.g.
  # "images/dhaka_bangladesh/2024-08-15/rgb.png", which resolve to
  # /finetune-flood/data/images/... at runtime.
  path: "/finetune-flood/data/flood_train.jsonl"
  type: "vlm_sft"
  test_size: 0.05

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 2          # images cost more memory than text — start lower
  gradient_accumulation_steps: 8          # effective batch 16
  learning_rate: 5.0e-5                   # full FT is more sensitive than LoRA — go gentler
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  eval_strategy: "steps"
  eval_steps: 50
  save_strategy: "epoch"
  logging_steps: 5
  bf16: true
  vision_encoder_lr_multiplier: 0.5       # let the vision tower adapt, but slower than the LM head
  tracker: "trackio"
  trackio_space_id: "jpmarindiaz/finetune-flood-trackio"

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: false                         # full fine-tune, not LoRA — see header

modal:
  app_name: "finetune-flood"
  gpu: "H100"
  timeout: 14400                          # 4 hours; full FT + images is heavier than text LoRA
  output_volume: "finetune-flood"
  output_dir: "/finetune-flood"
  detach: false
